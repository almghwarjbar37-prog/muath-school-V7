<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>تسجيل الدخول — مدرسة الشهيد معاذ الكساسبة</title>
<link rel="icon" href="/images/favicon.ico">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body style="cursor:auto">
<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px">
      <img src="/images/school-logo.jpg" class="logo-img-auth" style="display:block;margin:0 auto 12px" alt="شعار المدرسة">
      <h2 id="authTitle">تسجيل الدخول</h2>
      <p id="authDesc">أدخل بياناتك للمتابعة</p>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="your@email.com">
        <div class="form-error" id="loginEmailErr">بريد إلكتروني صحيح مطلوب</div>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="loginPass" placeholder="••••••••">
        <div class="form-error" id="loginPassErr">كلمة المرور مطلوبة</div>
      </div>
      <button class="btn btn-green" style="width:100%;margin-top:8px" id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>
      <div class="auth-switch">ليس لديك حساب؟ <a href="#" onclick="switchForm('register')">إنشاء حساب</a></div>
      <div style="text-align:center;margin-top:12px"><a href="/" style="color:var(--gray);font-size:.85rem;text-decoration:none">← العودة للرئيسية</a></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" id="regName" placeholder="اسمك الكامل">
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="regEmail" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>كلمة المرور (6 أحرف على الأقل)</label>
        <input type="password" id="regPass" placeholder="••••••••">
      </div>
      <button class="btn btn-green" style="width:100%;margin-top:8px" onclick="doRegister()">إنشاء الحساب</button>
      <div class="auth-switch">لديك حساب؟ <a href="#" onclick="switchForm('login')">تسجيل الدخول</a></div>
    </div>
  </div>
</div>

<script src="/js/script.js"></script>
<script>
// Redirect if already logged in
if (isLoggedIn()) window.location.href = isAdmin() ? '/admin' : '/';

function switchForm(type) {
  const isLogin = type === 'login';
  document.getElementById('loginForm').style.display    = isLogin ? 'block' : 'none';
  document.getElementById('registerForm').style.display = isLogin ? 'none'  : 'block';
  document.getElementById('authTitle').textContent = isLogin ? 'تسجيل الدخول' : 'إنشاء حساب';
  document.getElementById('authDesc').textContent  = isLogin ? 'أدخل بياناتك للمتابعة' : 'أنشئ حسابك الجديد';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  let valid = true;
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('loginEmailErr').classList.add('show'); valid=false; }
  else document.getElementById('loginEmailErr').classList.remove('show');
  if (!pass) { document.getElementById('loginPassErr').classList.add('show'); valid=false; }
  else document.getElementById('loginPassErr').classList.remove('show');
  if (!valid) return;

  const btn = document.getElementById('loginBtn');
  btn.textContent='⏳ جاري التحقق...'; btn.disabled=true;
  const res = await API.post('/api/auth/login', { email, password: pass });
  if (res.success) {
    localStorage.setItem('token', res.token);
    localStorage.setItem('user', JSON.stringify(res.user));
    showNotif('✅ مرحباً ' + res.user.name);
    setTimeout(() => { window.location.href = res.user.role === 'admin' ? '/admin' : '/'; }, 800);
  } else {
    showNotif('❌ ' + res.message, 'error');
    btn.textContent='تسجيل الدخول'; btn.disabled=false;
  }
}

async function doRegister() {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  if (!name || !email || !pass) { showNotif('❌ يرجى تعبئة جميع الحقول','error'); return; }
  if (pass.length < 6) { showNotif('❌ كلمة المرور 6 أحرف على الأقل','error'); return; }
  const res = await API.post('/api/auth/register', { name, email, password: pass });
  if (res.success) {
    localStorage.setItem('token', res.token);
    localStorage.setItem('user', JSON.stringify(res.user));
    showNotif('✅ تم إنشاء حسابك بنجاح!');
    setTimeout(() => { window.location.href = '/'; }, 800);
  } else {
    showNotif('❌ ' + res.message, 'error');
  }
}

// Enter key
document.addEventListener('keydown', e => { if (e.key==='Enter') { if(document.getElementById('loginForm').style.display!=='none') doLogin(); else doRegister(); } });
</script>
</body>
</html>
